<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#F0EEE8"/>
  <!-- 旅行箱 -->
  <rect x="100" y="50" width="200" height="200" rx="16" fill="#E0DCD4"/>
  <!-- 拉杆 -->
  <rect x="190" y="10" width="6" height="50" rx="3" fill="#D0CCC4"/>
  <rect x="204" y="10" width="6" height="50" rx="3" fill="#D0CCC4"/>
  <rect x="185" y="8" width="30" height="8" rx="4" fill="#C8C4BC"/>
  <!-- 滚轮 -->
  <circle cx="130" cy="255" r="10" fill="#D0CCC4"/>
  <circle cx="270" cy="255" r="10" fill="#D0CCC4"/>
  <!-- 拉链 -->
  <line x1="100" y1="130" x2="300" y2="130" stroke="#CCC" stroke-width="2"/>
  <!-- 提手 -->
  <path d="M175 50 Q200 38 225 50" fill="none" stroke="#D0CCC4" stroke-width="3" stroke-linecap="round"/>
  <text x="200" y="280" text-anchor="middle" font-size="12" fill="#999" font-family="sans-serif">旅行箱包</text>
</svg>
